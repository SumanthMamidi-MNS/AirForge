<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirForge Studio</title>
    <style>
      /* ─── Reset ──────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ─── Body ───────────────────────────── */
      body {
        background: #020617;
        overflow: hidden;
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        height: 100vh;
        width: 100vw;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Webcam Container ───────────────── */
      #webcam-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #webcam-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      #skeleton-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      /* ─── FPS Counter ────────────────────── */
      #fps-counter {
        position: fixed;
        top: 16px;
        left: 16px;
        background: rgba(2,6,23,0.82);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(6,182,212,0.25);
        border-radius: 8px;
        padding: 7px 14px;
        color: #22d3ee;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1.5px;
        z-index: 100;
        font-family: 'Courier New', monospace;
        user-select: none;
        -webkit-user-select: none;
      }

      /* ─── Status Bar ─────────────────────── */
      #status-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(2,6,23,0.82);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        padding: 9px 24px;
        color: rgba(203,213,225,0.9);
        font-size: 13.5px;
        font-weight: 500;
        letter-spacing: 0.3px;
        z-index: 100;
        transition: all 0.3s ease;
        text-align: center;
        user-select: none;
        -webkit-user-select: none;
        white-space: nowrap;
      }

      #status-bar.hand-lost {
        border-color: rgba(239,68,68,0.5);
        color: #fca5a5;
        animation: pulse-warning 1.8s ease-in-out infinite;
      }

      #status-bar.hand-detected {
        border-color: rgba(34,197,94,0.45);
        color: #86efac;
      }

      @keyframes pulse-warning {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* ─── Loading Overlay ────────────────── */
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 200;
        transition: opacity 0.5s ease;
      }

      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #00ffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #loading-text {
        color: #ffffff;
        font-size: 16px;
        letter-spacing: 1px;
        user-select: none;
        -webkit-user-select: none;
      }

      /* ─── Sidebar (Premium Glass) ─────────── */
      @keyframes sidebar-glow-pulse {
        0%, 100% { box-shadow: 0 0 24px rgba(34,197,94,0.06), 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07); }
        50%       { box-shadow: 0 0 36px rgba(34,197,94,0.10), 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07); }
      }

      #sidebar {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 248px;
        max-height: calc(100vh - 32px);
        background: linear-gradient(160deg, rgba(15,23,42,0.92) 0%, rgba(2,6,23,0.96) 100%);
        backdrop-filter: blur(24px) saturate(1.4);
        -webkit-backdrop-filter: blur(24px) saturate(1.4);
        border: 1px solid rgba(34,197,94,0.18);
        border-top: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 0;
        z-index: 50;
        overflow-y: auto;
        color: #cbd5e1;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        animation: sidebar-glow-pulse 4s ease-in-out infinite;
      }

      #sidebar::-webkit-scrollbar { width: 3px; }
      #sidebar::-webkit-scrollbar-track { background: transparent; }
      #sidebar::-webkit-scrollbar-thumb {
        background: rgba(34,197,94,0.35);
        border-radius: 2px;
      }
      #sidebar {
        scrollbar-width: thin;
        scrollbar-color: rgba(34,197,94,0.3) transparent;
      }

      #sidebar-header {
        padding: 18px 16px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        text-align: center;
        position: relative;
      }
      #sidebar-header::after {
        content: '';
        position: absolute;
        bottom: -1px; left: 20%; right: 20%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(34,197,94,0.5), transparent);
      }

      #sidebar-title {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1.5px;
        background: linear-gradient(135deg, #22c55e 0%, #06b6d4 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: none;
      }

      #sidebar-content {
        padding: 14px 14px 10px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        flex: 1;
      }

      .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .section-label {
        font-size: 9.5px;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        color: rgba(148,163,184,0.55);
        font-weight: 700;
        user-select: none;
        -webkit-user-select: none;
        padding-left: 2px;
      }

      /* ─── Color Palette ────────────────── */
      .color-palette {
        display: flex;
        gap: 9px;
        flex-wrap: wrap;
        padding: 2px 0;
      }

      .color-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.1);
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        outline: none;
        position: relative;
      }

      .color-btn:hover {
        transform: scale(1.2) translateY(-2px);
        border-color: rgba(255,255,255,0.7);
        box-shadow: 0 4px 16px currentColor;
      }

      .color-btn:focus-visible {
        outline: 2px solid #22c55e;
        outline-offset: 3px;
      }

      .color-btn.active {
        transform: scale(1.15);
        border-color: white;
        box-shadow:
          0 0 0 3px rgba(255,255,255,0.15),
          0 0 18px currentColor,
          0 0 36px currentColor;
      }

      /* ─── Brush Slider — Electric Cyan-White accent ──── */
      /* #7df9ff is unique: not used by any of the 5 brush color presets */
      #brush-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        /* Subtle cyan-to-white gradient track — holographic feel */
        background: linear-gradient(
          90deg,
          rgba(125,249,255,0.35),
          rgba(125,249,255,0.12)
        );
        outline: none;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      #brush-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        /* Solid cyan-white fill */
        background: #7df9ff;
        cursor: pointer;
        /* Depth ring + soft neon bloom */
        box-shadow:
          0 0 0 3px rgba(125,249,255,0.18),
          0 0 10px rgba(125,249,255,0.55),
          0 0 22px rgba(125,249,255,0.25);
        border: none;
        transition: box-shadow 0.18s ease;
      }

      #brush-slider::-webkit-slider-thumb:hover {
        box-shadow:
          0 0 0 5px rgba(125,249,255,0.22),
          0 0 16px rgba(125,249,255,0.75),
          0 0 32px rgba(125,249,255,0.35);
      }

      #brush-slider::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #7df9ff;
        cursor: pointer;
        box-shadow:
          0 0 0 3px rgba(125,249,255,0.18),
          0 0 10px rgba(125,249,255,0.55),
          0 0 22px rgba(125,249,255,0.25);
        border: none;
      }

      #brush-slider::-moz-range-track {
        height: 4px;
        border-radius: 2px;
        background: rgba(125,249,255,0.2);
        border: none;
      }

      #brush-slider:focus-visible {
        outline: 2px solid rgba(125,249,255,0.7);
        outline-offset: 4px;
      }

      /* ─── Buttons ─────────────────────── */
      .sidebar-btn {
        width: 100%;
        min-height: 38px;
        padding: 9px 14px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 11px;
        background: rgba(255,255,255,0.04);
        color: #94a3b8;
        cursor: pointer;
        font-size: 12.5px;
        font-weight: 500;
        text-align: left;
        transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        letter-spacing: 0.3px;
        user-select: none;
        -webkit-user-select: none;
        font-family: inherit;
      }

      .sidebar-btn:hover {
        background: rgba(34,197,94,0.09);
        border-color: rgba(34,197,94,0.35);
        color: #e2e8f0;
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(34,197,94,0.12);
      }

      .sidebar-btn:active {
        transform: translateY(0) scale(0.98);
        box-shadow: none;
      }

      .sidebar-btn:focus-visible {
        outline: 2px solid rgba(34,197,94,0.6);
        outline-offset: 2px;
      }

      /* Save button — orange accent (important action) */
      #btn-save {
        border-color: rgba(251,146,60,0.3);
        color: #fb923c;
      }
      #btn-save:hover {
        background: rgba(251,146,60,0.1);
        border-color: rgba(251,146,60,0.55);
        color: #fed7aa;
        box-shadow: 0 4px 16px rgba(251,146,60,0.15);
      }

      /* ─── Shape / BG Button Grid ────────── */
      .shape-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      .shape-btn,
      .bg-btn {
        padding: 8px 4px;
        border-radius: 9px;
        border: 1px solid rgba(255,255,255,0.09);
        background: rgba(255,255,255,0.04);
        color: rgba(148,163,184,0.7);
        cursor: pointer;
        font-size: 11.5px;
        font-family: inherit;
        transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
        text-align: center;
      }

      .shape-btn:hover,
      .bg-btn:hover {
        background: rgba(34,197,94,0.08);
        border-color: rgba(34,197,94,0.3);
        color: #e2e8f0;
        transform: translateY(-1px);
      }

      .shape-btn.active,
      .bg-btn.active {
        background: rgba(34,197,94,0.14);
        border-color: rgba(34,197,94,0.55);
        color: #4ade80;
        font-weight: 600;
        box-shadow: 0 0 12px rgba(34,197,94,0.2), inset 0 1px 0 rgba(34,197,94,0.15);
      }

      /* ─── Mode Switch Button ───────────── */
      .mode-switch-btn {
        width: 100%;
        margin-top: 6px;
        padding: 11px 14px;
        border: 1px solid rgba(6,182,212,0.3);
        border-radius: 12px;
        background: rgba(6,182,212,0.07);
        color: #22d3ee;
        cursor: pointer;
        font-size: 12.5px;
        font-weight: 700;
        letter-spacing: 0.6px;
        transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
        font-family: inherit;
        text-align: center;
      }

      .mode-switch-btn:hover {
        background: rgba(6,182,212,0.14);
        border-color: rgba(6,182,212,0.55);
        color: #e0f2fe;
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(6,182,212,0.18);
      }

      /* ─── Gesture Hints (Build) ────────── */
      .gesture-hint {
        font-size: 11.5px;
        line-height: 2.1;
        color: rgba(148,163,184,0.65);
        background: rgba(2,6,23,0.5);
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.06);
      }

      .gesture-hint span {
        color: #4ade80;
        font-weight: 600;
      }

      /* ─── Canvas Layers ──────────────────── */
      #ink-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        pointer-events: none;
      }

      #glow-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 4;
        pointer-events: none;
      }

      /* ─── Help Button ──────────────────── */
      #help-btn {
        position: fixed;
        top: 16px;
        right: 276px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid rgba(168,85,247,0.35);
        background: rgba(15,23,42,0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: #c084fc;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        z-index: 55;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        font-family: inherit;
      }

      #help-btn:hover {
        border-color: #00ff88;
        color: #00ff88;
        box-shadow: 0 0 16px rgba(0, 255, 136, 0.3);
      }

      #help-btn:focus-visible {
        outline: 2px solid #00ff88;
        outline-offset: 2px;
      }

      /* ─── Onboarding Animation ───────────── */
      @keyframes onboarding-in {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      /* ─── Selection Color ────────────────── */
      ::selection {
        background: rgba(0, 255, 136, 0.3);
        color: #ffffff;
      }

      ::-moz-selection {
        background: rgba(0, 255, 136, 0.3);
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <!-- ─── Loading Screen ─────────────────── -->
    <div id="loading-overlay">
      <div id="loading-spinner"></div>
      <div id="loading-text">Initializing Hand Tracking...</div>
    </div>

    <!-- ─── Webcam + Skeleton ──────────────── -->
    <div id="webcam-container">
      <video id="webcam-video" autoplay playsinline></video>
      <canvas id="skeleton-canvas"></canvas>
    </div>

    <!-- ─── Ink Space Canvas ───────────────── -->
    <canvas id="ink-canvas"></canvas>

    <!-- ─── Neon Glow Canvas ───────────────── -->
    <canvas id="glow-canvas"></canvas>

    <!-- ─── FPS Counter ────────────────────── -->
    <div id="fps-counter">FPS: --</div>

    <!-- ─── Status Bar ─────────────────────── -->
    <div id="status-bar" class="hand-lost">🖐️ Waiting for hand...</div>

    <!-- ─── Help Button ────────────────────── -->
    <button id="help-btn" title="Gesture Guide" aria-label="Open gesture guide">
      ?
    </button>

    <!-- ─── Right Sidebar ──────────────────── -->
    <div id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title">✍️ Ink Space</span>
      </div>

      <div id="sidebar-content">
        <!-- Color Palette -->
        <div class="sidebar-section">
          <div class="section-label">Brush Color</div>
          <div class="color-palette" id="color-palette">
            <button
              class="color-btn active"
              data-color="#00ff88"
              style="background: #00ff88"
              title="Neon Green"
              aria-label="Neon Green"
            ></button>
            <button
              class="color-btn"
              data-color="#ff6ec7"
              style="background: #ff6ec7"
              title="Neon Pink"
              aria-label="Neon Pink"
            ></button>
            <button
              class="color-btn"
              data-color="#00d4ff"
              style="background: #00d4ff"
              title="Neon Blue"
              aria-label="Neon Blue"
            ></button>
            <button
              class="color-btn"
              data-color="#ff8c42"
              style="background: #ff8c42"
              title="Neon Orange"
              aria-label="Neon Orange"
            ></button>
            <button
              class="color-btn"
              data-color="#da70ff"
              style="background: #da70ff"
              title="Neon Magenta"
              aria-label="Neon Magenta"
            ></button>
          </div>
        </div>

        <!-- Brush Size -->
        <div class="sidebar-section">
          <div class="section-label">
            Brush Size: <span id="brush-size-value">6</span>px
          </div>
          <input
            type="range"
            id="brush-slider"
            min="2"
            max="20"
            value="6"
            step="1"
            aria-label="Brush size"
          />
        </div>

        <!-- Actions -->
        <div class="sidebar-section">
          <div class="section-label">Actions</div>
          <button class="sidebar-btn" id="btn-clear">🗑️ Clear All</button>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button class="sidebar-btn" id="btn-undo" style="text-align:center;">↩️ Undo</button>
            <button class="sidebar-btn" id="btn-redo" style="text-align:center;">↪️ Redo</button>
          </div>
          <button class="sidebar-btn" id="btn-save">💾 Save as PNG</button>
        </div>
      </div>
    </div>

    <!-- ─── MediaPipe Legacy Hands (CDN) ───── -->
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1629159505/control_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"
      crossorigin="anonymous"
    ></script>

    <!-- ─── Our App ────────────────────────── -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
